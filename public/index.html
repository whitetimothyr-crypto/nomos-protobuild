<style>
  :root {
    --bg: #080810; --surface: #0c0c14; --border: #1a1a2e;
    --text: #E8E8E0; --muted: #666680;
    --primary: #3AAEAC; --purple: #C08CFF; --gold: #C9A84C; --red: #A0364E;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: 'Outfit', sans-serif; overflow-x: hidden; }

  .ambient { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .ambient::before { content: ''; position: absolute; top: -20%; left: -10%; width: 60%; height: 60%; background: radial-gradient(ellipse, rgba(58,174,172,0.07) 0%, transparent 70%); animation: drift1 18s ease-in-out infinite alternate; }
  .ambient::after { content: ''; position: absolute; bottom: -10%; right: -10%; width: 55%; height: 55%; background: radial-gradient(ellipse, rgba(192,140,255,0.06) 0%, transparent 70%); animation: drift2 22s ease-in-out infinite alternate; }
  @keyframes drift1 { from { transform: translate(0,0) scale(1); } to { transform: translate(4%,6%) scale(1.1); } }
  @keyframes drift2 { from { transform: translate(0,0) scale(1); } to { transform: translate(-5%,-4%) scale(1.08); } }

  .grid-lines { position: fixed; inset: 0; pointer-events: none; z-index: 0; background-image: linear-gradient(rgba(58,174,172,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(58,174,172,0.025) 1px, transparent 1px); background-size: 80px 80px; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%); }
  .top-rule { position: fixed; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent 0%, var(--primary) 40%, var(--purple) 60%, transparent 100%); opacity: 0.5; z-index: 10; }

  .corner { position: fixed; width: 20px; height: 20px; z-index: 10; animation: fadeIn 2s ease 1.5s both; }
  .corner-tl { top: 20px; left: 20px; border-top: 1px solid var(--primary); border-left: 1px solid var(--primary); }
  .corner-tr { top: 20px; right: 20px; border-top: 1px solid var(--primary); border-right: 1px solid var(--primary); }
  .corner-bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--primary); border-left: 1px solid var(--primary); }
  .corner-br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--primary); border-right: 1px solid var(--primary); }

  .container { position: relative; z-index: 1; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 4rem 2rem; text-align: center; }

  .wordmark { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(64px, 12vw, 120px); letter-spacing: 0.12em; color: var(--text); line-height: 1; opacity: 0; animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards; position: relative; }
  .wordmark::after { content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%); width: 0; height: 1px; background: var(--primary); animation: expandLine 1.2s cubic-bezier(0.16,1,0.3,1) 0.8s forwards; }
  @keyframes expandLine { from { width: 0; opacity: 0; } to { width: 40px; opacity: 1; } }

  .tagline { font-size: clamp(11px, 1.5vw, 13px); font-weight: 300; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-top: 2rem; opacity: 0; animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.5s forwards; }
  .divider { width: 1px; height: 48px; background: linear-gradient(180deg, transparent, var(--border), transparent); margin: 2.5rem auto; opacity: 0; animation: fadeIn 1s ease 0.9s forwards; }

  .badge { display: inline-flex; align-items: center; gap: 8px; border: 0.5px solid rgba(58,174,172,0.3); border-radius: 100px; padding: 6px 16px; font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--primary); background: rgba(58,174,172,0.06); opacity: 0; animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) 0.7s forwards; }
  .badge-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--primary); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity:1; transform:scale(1); } 50% { opacity:0.4; transform:scale(0.8); } }

  .descriptor { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: clamp(18px, 3vw, 26px); color: rgba(232,232,224,0.5); margin-top: 2rem; line-height: 1.5; max-width: 520px; opacity: 0; animation: slideUp 1s cubic-bezier(0.16,1,0.3,1) 1s forwards; }
  .descriptor em { color: var(--text); font-style: italic; }

  .preview-btn { display: inline-flex; align-items: center; gap: 10px; border: 0.5px solid rgba(192,140,255,0.3); border-radius: 100px; padding: 10px 24px; font-size: 12px; font-weight: 400; letter-spacing: 0.12em; text-transform: uppercase; color: var(--purple); background: rgba(192,140,255,0.06); cursor: pointer; transition: all 0.2s; font-family: 'Outfit', sans-serif; }

  .modal { background: var(--surface); border: 0.5px solid var(--border); border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 380px; text-align: center; animation: modalIn 0.3s cubic-bezier(0.16,1,0.3,1) forwards; }
  @keyframes modalIn { from { opacity:0; transform:scale(0.95) translateY(10px); } to { opacity:1; transform:scale(1) translateY(0); } }

  .modal-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(192,140,255,0.1); border: 0.5px solid rgba(192,140,255,0.2); display: flex; align-items: center; justify-content: center; margin: 0 auto 1.25rem; }
  .modal-icon svg { width: 20px; height: 20px; color: var(--purple); }
  .modal h3 { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: 22px; letter-spacing: 0.05em; color: var(--text); margin-bottom: 0.5rem; }
  .modal p { font-size: 12px; color: var(--muted); letter-spacing: 0.04em; margin-bottom: 1.5rem; line-height: 1.6; }

  .modal-input { width: 100%; background: var(--bg); border: 0.5px solid var(--border); border-radius: 8px; padding: 12px 16px; font-family: 'Outfit', sans-serif; font-size: 14px; color: var(--text); letter-spacing: 0.1em; outline: none; transition: border-color 0.2s; text-align: center; }
  .modal-input:focus { border-color: rgba(192,140,255,0.4); }
  .modal-input::placeholder { color: var(--muted); letter-spacing: 0.1em; }
  .modal-input.error { border-color: var(--red); animation: shake 0.3s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

  .modal-error { font-size: 11px; color: var(--red); margin-top: 0.5rem; height: 16px; letter-spacing: 0.06em; }
  .modal-actions { display: flex; gap: 10px; margin-top: 1.25rem; }
  .btn-cancel { flex: 1; padding: 10px; border-radius: 8px; border: 0.5px solid var(--border); background: transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .btn-cancel:hover { border-color: rgba(255,255,255,0.1); color: var(--text); }
  .btn-enter { flex: 2; padding: 10px; border-radius: 8px; border: 0.5px solid rgba(192,140,255,0.3); background: rgba(192,140,255,0.1); color: var(--purple); font-family: 'Outfit', sans-serif; font-size: 12px; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: all 0.2s; }
  .btn-enter:hover { background: rgba(192,140,255,0.18); }

  .contact { margin-top: 3.5rem; font-size: 11px; font-weight: 300; letter-spacing: 0.1em; color: var(--muted); opacity: 0; animation: fadeIn 1.5s ease 1.8s forwards; }
  .contact a { color: rgba(58,174,172,0.7); text-decoration: none; transition: color 0.2s; }
  .contact a:hover { color: var(--primary); }

  @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @media (max-width: 480px) { .pillars { gap: 1.2rem; } .modal { margin: 1rem; padding: 2rem; } }
</style>
</head>
