<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Partner Assessment &mdash; nomos schema</title>
<meta name="description" content="An honest assessment of nomos from its AI development partner."/>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root { --bg:#080810;--surface:#0c0c14;--border:#1a1a2e;--text:#E8E8E0;--muted:#666680;--muted2:#888899;--primary:#3AAEAC;--purple:#C08CFF;--gold:#C9A84C; }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}h
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;overflow-x:hidden}
.ambient{position:fixed;inset:0;pointer-events:none;z-index:0}
.ambient::before{content:'';position:absolute;top:-10%;left:-10%;width:50%;height:50%;background:radial-gradient(ellipse,rgba(58,174,172,0.05) 0%,transparent 70%)}
.ambient::after{content:'';position:absolute;bottom:10%;right:-5%;width:45%;height:45%;background:radial-gradient(ellipse,rgba(192,140,255,0.04) 0%,transparent 70%)}
.top-rule{position:fixed;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--primary) 40%,var(--purple) 60%,transparent 100%);opacity:0.4;z-index:10}
nav{position:fixed;top:0;left:0;right:0;z-index:20;padding:20px 40px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(to bottom,rgba(8,8,16,0.95) 0%,transparent 100%)}
.nav-wordmark{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:22px;letter-spacing:0.1em;color:var(--text);text-decoration:none}
.nav-link{font-size:11px;font-weight:400;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-link:hover{color:var(--primary)}
main{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:140px 2rem 100px}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade{opacity:0;animation:fadeUp 0.8s ease forwards}
.eyebrow{font-size:11px;font-weight:400;letter-spacing:0.22em;text-transform:uppercase;color:var(--primary);margin-bottom:1.5rem}
.hero-title{font-family:'Cormorant Garamond',serif;font-weight:300;font-style:italic;font-size:clamp(36px,6vw,58px);line-height:1.15;color:var(--text);margin-bottom:1.5rem}
.hero-title em{color:var(--primary)}
.founders-note{margin:48px 0 64px;padding:36px 40px;background:var(--surface);border:0.5px solid var(--border);border-radius:16px;border-left:2px solid var(--gold)}
.founders-note-label{font-size:10px;font-weight:500;letter-spacing:0.22em;text-transform:uppercase;color:var(--gold);margin-bottom:1rem}
.founders-note-body{font-size:16px;font-weight:300;line-height:1.85;color:var(--muted2)}
.founders-note-body em{color:var(--text);font-style:italic}
.founders-note-sig{margin-top:1.25rem;font-size:13px;color:var(--muted);letter-spacing:0.06em}
.testimony-meta{display:flex;align-items:center;gap:16px;margin-bottom:48px;padding-bottom:32px;border-bottom:1px solid var(--border)}
.testimony-meta-source{font-size:12px;color:var(--muted);letter-spacing:0.06em}
